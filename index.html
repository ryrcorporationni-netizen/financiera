<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Acceso Financiera</title>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-area">
                <h2>Financiera App</h2>
                <p>Ingresa para gestionar tu cartera</p>
            </div>
            
            <form id="loginForm" action="#" onsubmit="return false;">
                <div class="user-box">
                    <input type="text" id="email" required placeholder="Correo electrónico">
                </div>
                <div class="user-box">
                    <input type="password" id="password" required placeholder="Contraseña">
                </div>
                
                <div class="form-footer">
                    <a href="#" onclick="recuperarPassword()" class="forgot-pass">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>
        </div>
    </div>

    <script>
    // Seleccionamos el formulario para prevenir el envío por defecto
    document.getElementById('loginForm').addEventListener('submit', function(event) {
    // Esto es lo más importante: detiene cualquier acción nativa del formulario
    event.preventDefault(); 
    event.stopPropagation();
    
    const emailInput = document.getElementById('email').value.trim();
    if (!emailInput) {
        alert("Por favor ingresa un usuario");
        return false;
    }

    const primerCaracter = emailInput.toUpperCase().charAt(0);
    
    // Rutas relativas corregidas según tu estructura de carpetas
    switch(primerCaracter) {
        case 'A':
            window.location.href = "administracion_html/admin.html";
            break;
        case 'R':
            window.location.href = "cobrador_html/cobrador.html";
            break;
        case 'C':
            window.location.href = "cliente_html/estado_cuenta.html";
            break;
        default:
            alert("Usuario o rol no reconocido.");
    }
    return false; // Asegura que no se procese nada más
});
    </script>
    <script>
        function recuperarPassword() {
            const email = document.getElementById('email').value;
            if (email === "") {
                alert("Por favor, ingresa tu correo electrónico primero para recuperar la contraseña.");
            } else {
                alert("Se ha enviado un enlace de recuperación a: " + email);
            }
        }
    </script>
</body>

</html>
